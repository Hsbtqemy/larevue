{% load edito %}
<div x-data="contactAutocomplete({ searchUrl: '{{ search_url|escapejs }}', initialName: '{{ initial_name|escapejs }}', initialId: '{{ initial_id }}' })"
     style="position:relative">

  <input type="hidden" name="{{ id_field }}" :value="selectedId">

  <input type="text"
         name="{{ name_field }}"
         x-model="query"
         @blur="onBlur()"
         @keydown.escape="open = false"
         placeholder="{{ placeholder|default:'Rechercher un contact…' }}"
         class="text-input"
         autocomplete="off">

  <template x-if="open">
    <div class="autocomplete-dropdown">
      <template x-for="item in results" :key="item.id">
        <button type="button"
                class="autocomplete-item"
                @mousedown.prevent="select(item)">
          <span x-text="item.name" style="font-weight:500"></span>
          <span x-show="item.affiliation"
                x-text="item.affiliation"
                class="muted"
                style="font-size:12px;margin-left:6px"></span>
        </button>
      </template>
    </div>
  </template>

  {% if create_url %}
    <div x-show="query.trim() && !selectedId && !open && !loading"
         style="margin-top:4px;font-size:12px;color:var(--ink-muted)">
      Aucun contact trouvé —
      <a href="{{ create_url }}" target="_blank" style="color:var(--accent)">Créer un nouveau contact</a>
    </div>
  {% endif %}

</div>
