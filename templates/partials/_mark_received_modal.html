{% load edito %}
<div x-data="markReceived('{{ mark_received_url|escapejs }}')">
  {% if spec.enabled %}
    <button type="button" class="btn {{ spec.ui_variant }}" @click="show()">
      {{ spec.label }}
    </button>
  {% else %}
    <button type="button" class="btn {{ spec.ui_variant }}" disabled>{{ spec.label }}</button>
  {% endif %}

  <template x-teleport="body">
    <div x-show="open"
         class="modal-backdrop"
         @click.self="cancel()"
         @keydown.escape.window="cancel()"
         x-transition.opacity>
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head">
          <h3>{{ spec.label }}</h3>
        </div>
        <div class="modal-body">
          <p style="font-size:14px;color:var(--ink-muted);margin-bottom:16px">{{ spec.description }}</p>
          <div class="field">
            <label style="font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;color:var(--ink-faint)">
              Fichier de l'article <span style="color:var(--ink-faint)">(requis)</span>
            </label>
            <input type="file"
                   class="text-input"
                   style="cursor:pointer"
                   accept=".pdf,.doc,.docx,.odt,.rtf"
                   @change="onFileChange($event)">
            <template x-if="fileName">
              <div class="tiny muted" style="margin-top:4px" x-text="fileName"></div>
            </template>
          </div>
          <template x-if="error">
            <div class="form-msg err" x-text="error" style="margin-top:8px"></div>
          </template>
        </div>
        <div class="modal-foot">
          <button type="button" class="btn ghost" @click="cancel()" :disabled="submitting">
            Annuler
          </button>
          <button type="button"
                  class="btn primary"
                  @click="submit()"
                  :disabled="submitting || !file">
            <span x-text="submitting ? 'Envoi…' : 'Marquer comme reçu'">Marquer comme reçu</span>
          </button>
        </div>
      </div>
    </div>
  </template>
</div>
