{% load edito %}<span x-data="inlineEdit('{{ value|escapejs }}', '{{ url }}', '{{ field_name }}', '{{ type }}', {{ options|to_json }})"
      class="inline-edit-wrap">

  <span x-show="!editing"
        class="editable-display"
        :class="{'empty': !draft, 'just-saved': justSaved}"
        role="button"
        tabindex="0"
        title="Cliquer pour modifier"
        @click="startEdit()"
        @keydown.enter.prevent="startEdit()"
        @keydown.space.prevent="startEdit()">
    <span x-text="displayDraft || '{{ placeholder|escapejs }}'"></span>
    <span x-show="justSaved" class="saved-tick" aria-hidden="true">&nbsp;✓</span>
  </span>

  <template x-if="editing && (type === 'text' || type === 'date')">
    <input x-ref="inputText"
           :type="type === 'date' ? 'date' : 'text'"
           {% if datalist_id %}list="{{ datalist_id }}"{% endif %}
           x-model="draft"
           class="editable-input"
           @blur="commit()"
           @keydown.enter.prevent="commit()"
           @keydown.escape.prevent="cancel()">
  </template>

  {% if datalist_id %}
  <datalist id="{{ datalist_id }}">
    {% for opt in datalist_options %}<option value="{{ opt }}">{% endfor %}
  </datalist>
  {% endif %}

  <template x-if="editing && type === 'textarea'">
    <textarea x-ref="inputTextarea"
              x-model="draft"
              class="editable-input textarea"
              rows="6"
              @blur="commit()"
              @keydown.meta.enter.prevent="commit()"
              @keydown.ctrl.enter.prevent="commit()"
              @keydown.escape.prevent="cancel()"></textarea>
  </template>

  <template x-if="editing && type === 'select'">
    <select x-ref="inputSelect"
            x-model="draft"
            class="editable-input select"
            @change="commit()"
            @blur="cancel()"
            @keydown.escape.prevent="cancel()">
      {% for val, label in options %}
        <option value="{{ val }}">{{ label }}</option>
      {% endfor %}
    </select>
  </template>

  <span x-show="error" class="inline-edit-error small muted" x-text="error"></span>
</span>
