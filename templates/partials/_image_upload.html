{% load edito %}
<div x-data="imageUpload('{{ current_url|default:''|escapejs }}', '{{ upload_url }}', '{{ field_name }}')"
     class="image-upload"
     :class="[preview ? 'has-image' : 'empty', dragOver ? 'drag-over' : '', '{{ compact|yesno:'compact,' }}']"
     :style="'aspect-ratio: {{ aspect_ratio|default:'3 / 2' }}'"
     @dragover.prevent="dragOver = true"
     @dragleave="dragOver = false"
     @drop.prevent="onDrop($event)"
     @click="!preview && $refs.fileInput.click()"
     role="button"
     tabindex="0"
     @keydown.enter.prevent="$refs.fileInput.click()"
     @keydown.space.prevent="$refs.fileInput.click()">

  <template x-if="!preview">
    <div class="image-upload-prompt">
      {% icon "upload" 24 %}
      <div class="image-upload-label">{{ label|default:"Ajouter une image" }}</div>
      <div class="image-upload-hint">Glisser-déposer ou cliquer — JPG, PNG · 5 Mo max</div>
    </div>
  </template>

  <template x-if="preview">
    <div style="position:relative;width:100%;height:100%">
      <img :src="preview" alt="" class="image-upload-preview">
      <div class="image-upload-overlay">
        <button type="button" class="btn sm" @click.stop="$refs.fileInput.click()">
          {% icon "upload" 12 %} Remplacer
        </button>
        <button type="button" class="btn sm danger" @click.stop="remove()">
          {% icon "close" 12 %} Retirer
        </button>
      </div>
    </div>
  </template>

  <div x-show="err" class="image-upload-err" x-text="err"></div>
  <div x-show="uploading" class="image-upload-err muted" style="font-style:italic">Envoi en cours…</div>

  <input x-ref="fileInput"
         type="file"
         accept="image/*"
         style="display:none"
         @change="handleFile($event.target.files[0])">
</div>
