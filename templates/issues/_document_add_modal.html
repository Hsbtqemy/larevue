{% load edito %}
{# Add-document modal.
   Context: journal, issue, create_url.
   Self-contained Alpine component: manages open state, file drop zone, and name pre-fill. #}
<div x-data="{
  open: false,
  name: '',
  fileName: null,
  isDragging: false,
  onFileChange(e) {
    const file = e.target.files[0] || null;
    this.fileName = file ? file.name : null;
    if (!this.name && file) {
      this.name = file.name.replace(/\.[^.]+$/, '');
    }
  },
  onDrop(e) {
    this.isDragging = false;
    const file = e.dataTransfer.files[0] || null;
    if (file) {
      this.fileName = file.name;
      const input = this.$refs.docFile;
      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
      if (!this.name) this.name = file.name.replace(/\.[^.]+$/, '');
    }
  },
  clearFile(e) {
    e.stopPropagation();
    this.fileName = null;
    this.$refs.docFile.value = '';
  },
  resetAndClose() {
    this.open = false;
    this.name = '';
    this.fileName = null;
    if (this.$refs.docFile) this.$refs.docFile.value = '';
  }
}">

  <button type="button" class="btn primary sm" @click="open = true">
    {% icon "plus" 14 cls="icon" %} Ajouter un document
  </button>

  <template x-teleport="body">
    <div x-show="open"
         class="modal-backdrop"
         @click.self="resetAndClose()"
         @keydown.escape.window="resetAndClose()"
         x-transition.opacity>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title-doc-add">
        <div class="modal-head">
          <h3 id="modal-title-doc-add">Ajouter un document au numéro</h3>
        </div>
        <form method="post" action="{{ create_url }}" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="modal-body">

            <div class="field">
              <label for="doc-name">Nom du document <span class="req">*</span></label>
              <input type="text"
                     id="doc-name"
                     name="name"
                     x-model="name"
                     required
                     placeholder="Ex : Projet de numéro initial">
            </div>

            <div class="field">
              <label for="doc-description">Description</label>
              <textarea id="doc-description"
                        name="description"
                        rows="3"
                        placeholder="Optionnel — pour préciser le contenu du document."></textarea>
            </div>

            <div class="field">
              <label>Fichier <span class="req">*</span></label>
              <div class="file-drop-zone"
                   :class="{ dragging: isDragging }"
                   @dragover.prevent="isDragging = true"
                   @dragleave.prevent="isDragging = false"
                   @drop.prevent="onDrop($event)"
                   @click="$refs.docFile.click()">
                <input type="file"
                       name="file"
                       x-ref="docFile"
                       @change="onFileChange($event)"
                       required>
                <template x-if="!fileName">
                  <div>
                    <div class="drop-label">Glissez un fichier ou cliquez pour parcourir</div>
                    <div class="drop-hint">PDF, Word, ODT, ZIP… — 25 Mo maximum.</div>
                  </div>
                </template>
                <template x-if="fileName">
                  <div>
                    <div class="drop-filename" x-text="fileName"></div>
                    <div><button type="button" class="drop-clear" @click.stop="clearFile($event)">Retirer</button></div>
                  </div>
                </template>
              </div>
            </div>

          </div>
          <div class="modal-foot">
            <button type="button" class="btn ghost" @click="resetAndClose()">Annuler</button>
            <button type="submit" class="btn primary">Ajouter le document</button>
          </div>
        </form>
      </div>
    </div>
  </template>

</div>
