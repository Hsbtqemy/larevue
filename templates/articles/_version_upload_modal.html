{% load edito %}
{% if show %}
<div x-data="{ open: false }">

  <button type="button"
          class="btn primary sm"
          @click="open = true">
    {% icon "upload" 14 cls="icon" %}
    {% if is_first %}Déposer le fichier{% else %}Déposer une nouvelle version{% endif %}
  </button>

  <template x-teleport="body">
    <div x-show="open"
         class="modal-backdrop"
         @click.self="open = false"
         @keydown.escape.window="open = false"
         x-transition.opacity>
      <div class="modal" role="dialog" aria-modal="true">
        <form method="post" action="{{ upload_url }}" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="modal-head">
            <h3>{% if is_first %}Déposer le fichier de l'article{% else %}Déposer une nouvelle version{% endif %}</h3>
          </div>
          <div class="modal-body">
            <div class="edit-meta-form">
              <div class="field full">
                <label>Fichier <span class="req">*</span></label>
                <input type="file" name="file" required style="font-size:13px">
              </div>
              <div class="field full">
                <label>Description <span class="faint">(optionnel)</span></label>
                <textarea name="comment" class="text-input" rows="3" placeholder="Note de version, changements apportés…"></textarea>
              </div>
            </div>
          </div>
          <div class="modal-foot">
            <button type="button" class="btn ghost" @click="open = false">Annuler</button>
            <button type="submit" class="btn primary">Déposer</button>
          </div>
        </form>
      </div>
    </div>
  </template>

</div>
{% endif %}
