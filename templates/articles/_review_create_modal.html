{% load edito %}
<div x-data="{ open: false }"
     @htmx:after-request.window="if ($event.detail.elt && $event.detail.elt.id === 'review-create-form' && $event.detail.successful) { open = false; $event.detail.elt.reset(); }">

  {% if not is_archived %}
    <button type="button"
            class="btn primary sm"
            @click="open = true"
            {% if version_count == 0 %}disabled{% endif %}>
      {% icon "users" 14 cls="icon" %} Désigner un relecteur·ice
    </button>
    {% if version_count == 0 %}
      <p class="hint muted" style="font-size:12.5px;margin-top:6px">
        Déposez la première version de l'article avant de désigner un relecteur·ice.
      </p>
    {% endif %}
  {% endif %}

  <template x-teleport="body">
    <div x-show="open"
         class="modal-backdrop"
         @click.self="open = false"
         @keydown.escape.window="open = false"
         x-transition.opacity>
      <div class="modal" role="dialog" aria-modal="true">
        <form id="review-create-form"
              hx-post="{{ review_create_url }}"
              hx-target="#reviews-active-list"
              hx-swap="afterbegin">
          {% csrf_token %}
          <div class="modal-head">
            <h3>Désigner un relecteur·ice</h3>
          </div>
          <div class="modal-body">
            <div class="edit-meta-form">
              <div class="field full">
                <label>Relecteur·ice *</label>
                {% include "partials/_contact_autocomplete.html" with search_url=reviewer_search_url id_field="reviewer_id" name_field="reviewer_name" initial_id="" initial_name="" placeholder="Nom ou affiliation…" create_url="" %}</div>
              <div class="field">
                <label>Date limite *</label>
                <input type="date" name="deadline" class="text-input" value="{{ default_deadline }}" required>
              </div>
            </div>
          </div>
          <div class="modal-foot">
            <button type="button" @click="open = false" class="btn ghost">Annuler</button>
            <button type="submit" class="btn primary">Désigner</button>
          </div>
        </form>
      </div>
    </div>
  </template>
</div>
