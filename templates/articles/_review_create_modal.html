{% load edito %}
<div x-data="{ open: false }"
     @htmx:after-request.window="if ($event.detail.elt && $event.detail.elt.id === 'review-create-form' && $event.detail.successful) { open = false; $event.detail.elt.reset(); }">

  {% if not is_archived %}
    <button type="button"
            class="btn primary sm"
            @click="open = true"
            {% if version_count == 0 %}disabled{% endif %}>
      {% icon "users" 14 cls="icon" %} Demander une relecture
    </button>
    {% if version_count == 0 %}
      <p class="hint muted" style="font-size:12.5px;margin-top:6px">
        Déposez la première version de l'article avant de demander une relecture.
      </p>
    {% endif %}
  {% endif %}

  <template x-teleport="body">
    <div x-show="open"
         class="modal-backdrop"
         @click.self="open = false"
         @keydown.escape.window="open = false"
         x-transition.opacity>
      <div class="modal" role="dialog" aria-modal="true">
        <form id="review-create-form"
              hx-post="{{ review_create_url }}"
              hx-target="#reviews-expected-list"
              hx-swap="afterbegin">
          {% csrf_token %}
          <div class="modal-head">
            <h3>Demander une relecture</h3>
          </div>
          <div class="modal-body">
            <div class="edit-meta-form">
              <div class="field full">
                <label>Relecteur·ice *</label>
                <select name="reviewer" class="text-input" required>
                  <option value="">— Choisir —</option>
                  {% for c in reviewer_options %}
                    <option value="{{ c.pk }}">{{ c.full_name }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="field">
                <label>Version à relire *</label>
                <select name="article_version" class="text-input" required>
                  {% for v in versions %}
                    <option value="{{ v.pk }}"{% if forloop.first %} selected{% endif %}>v{{ v.version_number }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="field">
                <label>Date limite *</label>
                <input type="date" name="deadline" class="text-input" value="{{ default_deadline }}" required>
              </div>
            </div>
          </div>
          <div class="modal-foot">
            <button type="button" @click="open = false" class="btn ghost">Annuler</button>
            <button type="submit" class="btn primary">Envoyer la demande</button>
          </div>
        </form>
      </div>
    </div>
  </template>
</div>
