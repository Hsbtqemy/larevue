<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Outil éditorial{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  {% load static %}
  <script defer src="{% static 'js/edito.js' %}"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}min-h-screen bg-gray-50 text-gray-900{% endblock %}">
  {% include "partials/_saved_banner.html" %}
  {% if messages %}
    <div style="position:fixed;top:20px;right:20px;z-index:400;display:flex;flex-direction:column;gap:8px">
      {% for message in messages %}
        <div class="saved-banner" style="background:{% if 'error' in message.tags %}#c0392b{% else %}#2d6a4f{% endif %}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
  {% block content %}{% endblock %}
</body>
</html>
